name: Overleaf sync

# Mirror `paper/` to the Overleaf Git remote so collaborators can comment /
# track-change in Overleaf while GitHub stays canonical.
#
# Requires repo secrets:
#   OVERLEAF_PROJECT_ID  — the ID at the end of the Overleaf project URL
#   OVERLEAF_TOKEN       — generated at Overleaf → Account Settings → Git Integration
#
# Two jobs:
#   push-to-overleaf:    on push to paper/** or figures/paper/**, clones
#                        Overleaf, mirrors `paper/` into it, commits, pushes.
#   pull-from-overleaf:  hourly cron that fetches Overleaf into a
#                        `from-overleaf` branch so collaborator edits land
#                        as a PR to merge into main.

on:
  push:
    branches: [main]
    paths:
      - 'paper/**'
      - 'figures/paper/**'
  schedule:
    - cron: '17 * * * *'  # hourly, off the hour to avoid GHA queue spikes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push-to-overleaf:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Mirror paper/ into Overleaf clone and push
        env:
          OVERLEAF_PROJECT_ID: ${{ secrets.OVERLEAF_PROJECT_ID }}
          OVERLEAF_TOKEN:      ${{ secrets.OVERLEAF_TOKEN }}
        run: |
          if [ -z "$OVERLEAF_PROJECT_ID" ] || [ -z "$OVERLEAF_TOKEN" ]; then
            echo "::warning::Overleaf secrets not set — skipping push"
            exit 0
          fi
          # Overleaf prohibits force-push. Clone Overleaf, replace working tree
          # with paper/ contents, commit, push along the existing master lineage.
          SRC="$PWD/paper"
          FIGS="$PWD/figures/paper"
          TMP=$(mktemp -d)
          git clone "https://git:${OVERLEAF_TOKEN}@git.overleaf.com/${OVERLEAF_PROJECT_ID}" "$TMP/overleaf"
          cd "$TMP/overleaf"
          git rm -rf --quiet . || true
          rsync -a --exclude='.git' "$SRC"/ ./
          # main.tex references figures via \graphicspath{./figures/}.
          # Overleaf only sees what we push, so copy the .pdf renders into
          # ./figures/ before commit. PDFs only — keeps the project small.
          mkdir -p figures
          cp "$FIGS"/*.pdf figures/ 2>/dev/null || true
          git add -A
          if ! git diff --quiet --cached; then
            git -c user.email="github-actions[bot]@users.noreply.github.com" \
                -c user.name="github-actions[bot]" \
                commit -m "Mirror paper/ from GitHub @ ${GITHUB_SHA::7}"
            git push origin master
          else
            echo "[overleaf] no changes vs Overleaf master — skipping push"
          fi

  pull-from-overleaf:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Overleaf into a branch
        env:
          OVERLEAF_PROJECT_ID: ${{ secrets.OVERLEAF_PROJECT_ID }}
          OVERLEAF_TOKEN:      ${{ secrets.OVERLEAF_TOKEN }}
        run: |
          if [ -z "$OVERLEAF_PROJECT_ID" ] || [ -z "$OVERLEAF_TOKEN" ]; then
            echo "::warning::Overleaf secrets not set — skipping pull"
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git remote add overleaf "https://git:${OVERLEAF_TOKEN}@git.overleaf.com/${OVERLEAF_PROJECT_ID}"
          git fetch overleaf master
          # Drop paper/ from both working tree AND index before re-staging
          # from overleaf, otherwise `read-tree --prefix=paper/` collides with
          # the existing index entries.
          git rm -rf --quiet paper/
          git read-tree --prefix=paper/ -u overleaf/master
          if ! git diff --quiet --cached; then
            git checkout -B from-overleaf
            git commit -m "Pull collaborator edits from Overleaf $(date -u +%Y-%m-%dT%H:%MZ)"
            git push --force origin from-overleaf
            echo "::notice::Pushed updated from-overleaf branch — open a PR to merge into main"
          fi
